# Supabase local development config.
# Project: faka — Dashboard Omnicanal de Ventas + Capa de IA.
# Reference: https://supabase.com/docs/guides/cli/config

project_id = "faka"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"
image_transformation = { enabled = false }

# Private bucket for CSV uploads (ADR-001 LOCKED — payload retention).
# Bucket created by migration 20260513000003_raw_layer.sql.

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false                  # Super Admin creates users via auth.admin API
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 12
password_requirements = "lower_upper_letters_digits_symbols"

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = false           # Local dev: skip email confirmations
secure_password_change = true
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

# Custom Access Token Hook — ADR-002 LOCKED.
# Reads role from public.profiles and writes into JWT claim `role` +
# `app_metadata.role` so both client and RLS policies can read it.
# Function definition + grants live in migration 0009.
[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[analytics]
enabled = false
