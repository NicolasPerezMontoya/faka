# Railway config for the faka orchestrator.
# RESEARCH §1 + §10 — monorepo gotcha: the reference path must be
# absolute (`/apps/orchestrator/railway.toml`) when configured in the
# Railway dashboard's "config-as-code" field.
#
# Services: orchestrator-web (HTTP) + multiple orchestrator-cron entries.
# Each cron service shares the same image; the argv dispatcher in
# `src/cron.ts` selects the job by argv[2].

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/orchestrator/Dockerfile"

# ─── Web service ─────────────────────────────────────────────────
[[services]]
name = "orchestrator-web"

[services.deploy]
startCommand = "node dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# ─── Cron service: heartbeat ─────────────────────────────────────
# `node dist/cron.js heartbeat` writes kind='cron-heartbeat'. F2 (Plan 2.3.2)
# made cron.js argv-driven so a single binary handles every scheduled job.
[[services]]
name = "orchestrator-cron"

[services.deploy]
startCommand = "node dist/cron.js heartbeat"
restartPolicyType = "NEVER"

[services.cron]
# Minimum granularity on Railway is 5 minutes; UTC only.
schedule = "*/30 * * * *"

# ─── Cron service: process-wp-events (Plan 2.3.2) ────────────────
# Drains `raw_orders WHERE canal='wordpress' AND processed=false`. Writes ONE
# `connector_runs` row per tick with kind='channel' + canal='wordpress'.
# Plan spec asked for `* * * * *` but Railway's 5-minute minimum granularity
# (RESEARCH §Pitfall 7 / F1 PLAN 1.4.2) is the floor — documented deviation.
# Five-minute cadence still drains a healthy webhook stream well under
# operator-perceptible latency, and the batch fetches up to 100 rows so the
# steady state remains tight.
[[services]]
name = "orchestrator-cron-process-wp-events"

[services.deploy]
startCommand = "node dist/cron.js process-wp-events"
restartPolicyType = "NEVER"

[services.cron]
schedule = "*/5 * * * *"

# ─── Cron service: sync-wp-orders (Plan 2.3.3) ───────────────────
# Hourly REST pull of `/orders?modified_after=...` — insurance against missed
# webhooks (RESEARCH §Pattern 2). Degrades to a no-op when WORDPRESS_API_*
# is unset (records `status='succeeded', errors_json.reason='not_configured'`).
# Uses `modified_after` (not `after`) per RESEARCH §Pitfall 3 so order status
# changes (cancellations, refunds) are captured. `since` is computed from the
# last successful run's `completed_at` (metadata_json.tipo='orders') with a
# 25h fallback that overlaps the hourly cadence — safe given the UPSERT on
# (canal, external_order_id) makes the webhook + cron paths commutative
# (Pitfall 4). Per-item cascade runs in-line via runMatchCascade + persistMatch.
# Stagger: orders at :00, products at :30 to avoid simultaneous WC API load.
[[services]]
name = "orchestrator-cron-sync-wp-orders"

[services.deploy]
startCommand = "node dist/cron.js sync-wp-orders"
restartPolicyType = "NEVER"

[services.cron]
schedule = "0 * * * *"

# ─── Cron service: sync-wp-products (Plan 2.3.3) ─────────────────
# Hourly REST pull of `/products?modified_after=...` — keeps master_products
# + product_mappings current so cascade levels 1-2 (barcode + supplier_code)
# have data to match against. Embedding regeneration is deferred to the
# `reembed-products` cron below, which uses the source_hash short-circuit
# (RESEARCH §Pitfall 5) — DO NOT inline an embeddings call here.
# Degraded path identical to sync-wp-orders.
[[services]]
name = "orchestrator-cron-sync-wp-products"

[services.deploy]
startCommand = "node dist/cron.js sync-wp-products"
restartPolicyType = "NEVER"

[services.cron]
schedule = "30 * * * *"

# ─── Cron service: reembed-products (Plan 2.3.4) ─────────────────
# Daily refresh of `product_embeddings` for the master_products catalog.
# The embeddings service short-circuits via sha256(source_text) so
# unchanged rows skip the OpenAI API entirely (RESEARCH §Pitfall 5).
#
# Schedule rationale: 04:00 UTC = 23:00 Bogotá — off-peak so a slow
# OpenAI tick doesn't compete with daytime WP traffic or the per-hour
# sync-wp-products pull. Cap defaults to 500 products / run
# (REEMBED_BATCH_SIZE env override).
#
# Degraded: OPENAI_API_KEY unset → records status=succeeded,
# errors_json.reason='no_embedding_provider' and exits 0.
[[services]]
name = "reembed-products"

[services.deploy]
startCommand = "node dist/cron.js reembed-products"
restartPolicyType = "NEVER"

[services.cron]
schedule = "0 4 * * *"

# ─── Cron service: re-cascade-unmatched (Plan 2.3.4) ─────────────
# Every 6h: retry the matching cascade on `sale_items` rows still in the
# queue (`master_sku IS NULL AND created_at > now() - 7d`). Capped at
# RECASCADE_BATCH_SIZE rows per run (default 200) and gated by
# LLM_DAILY_TOKEN_CAP via TokenBudgetTracker (RESEARCH §Pitfall 7) so the
# cron can't blow the daily LLM budget. Idempotent: persistMatch UPSERTs
# on (canal, external_id) and only writes sale_items.master_sku when NULL.
[[services]]
name = "re-cascade-unmatched"

[services.deploy]
startCommand = "node dist/cron.js re-cascade-unmatched"
restartPolicyType = "NEVER"

[services.cron]
schedule = "0 */6 * * *"

# ─── Cron service: ml-refresh-tokens (F2.1 Plan 2.1.1.4) ─────────
# Every 5h: sweep `oauth_tokens` rows that will expire within 1h and rotate
# their (access_token, refresh_token) pair via the OAuth refresh flow in
# `@faka/connectors/mercadolibre/oauth`. This is the SAFETY NET behind the
# primary lazy-refresh-on-401 path inside the ML api-client (Plan 2.1.2.1)
# and the `expires_at < now() + 60s` skew check inside `loadAccessToken`
# (Plan 2.1.1.2) — those handle the common case; this cron handles the
# dormant-token edge case (>6h with no API traffic).
#
# Race-condition mitigation: refreshToken() guards each rotation with a
# Postgres transactional advisory lock (RESEARCH §Pitfall 1) so concurrent
# crons can't double-rotate and lose the single-use refresh_token.
#
# Cadence rationale: 5h is calibrated to ML's 6h access-token TTL — always
# at least 1h of headroom even if Railway's scheduler is delayed.
#
# Degraded mode (any ML_* env unset): writes `status=succeeded,
# records_processed=0, errors_json.reason='not_configured'` and exits 0.
# `failed` would page the cliente during the pre-OAuth period and we don't
# want that noise — the connector_runs row is the audit trail.
[[services]]
name = "orchestrator-cron-ml-refresh-tokens"

[services.deploy]
startCommand = "node dist/cron.js ml-refresh-tokens"
restartPolicyType = "NEVER"

[services.cron]
schedule = "0 */5 * * *"

# ─── Cron service: sync-ml-orders (F2.1 Plan 2.1.3.2) ────────────
# Every 15 min: pull ML orders since the last successful tipo='orders' run,
# UPSERT into `sales` on (canal, external_order_id), insert sale_items on
# (sale_id, external_product_id), and run the F2 5-level matching cascade
# (runMatchCascade + persistMatch from @faka/connectors/matching) on every
# unmatched line item. The cron is the authoritative orders path for ML —
# the webhook (Plan 2.1.3.1) is the < 15-min latency path that drops a
# pointer into raw_orders; this cron does the actual reconciliation.
#
# Cadence rationale: 15 min matches ML's eventual-consistency floor for
# /orders/search; a tighter cadence wouldn't surface new data faster but
# would burn ML's rate-limit budget. The cron applies a 5-min overlap
# window so edits ML surfaced just after the prior run's cutoff still
# land (UPSERTs absorb the overlap — RESEARCH §Pattern 3).
#
# F2-CASCADE-REUSE invariant: runMatchCascade is imported from
# @faka/connectors/matching — F2 Wave 2 output. We never re-implement
# levels 1-5 here.
#
# Degraded mode (any ML_* env unset OR no oauth_tokens row yet): records
# `status=succeeded, records_processed=0, errors_json.reason='not_configured'
# or 'no_oauth_token_row'` and exits 0 — same pre-OAuth-silence policy as
# ml-refresh-tokens above.
[[services]]
name = "orchestrator-cron-sync-ml-orders"

[services.deploy]
startCommand = "node dist/cron.js sync-ml-orders"
restartPolicyType = "NEVER"

[services.cron]
schedule = "*/15 * * * *"

# ─── Cron service: sync-ml-products (F2.1 Plan 2.1.3.3) ──────────
# Every 60 min: pull ML items via search_type=scan + scroll_id (bypasses
# the 1000-record cap), 20-id batched /items?ids=... detail fetch with
# include_attributes=all (Pitfall 5 — surfaces out-of-stock variations),
# and call upsertProductWithVariants per item — the three-write UPSERT
# chain (master_products + product_variants + product_mappings) keeps
# the cascade's barcode/supplier_code/embeddings levels fresh.
#
# Cadence rationale: 60 min matches ML's items endpoint's eventual-
# consistency floor; tighter would just churn the UPSERT chain.
# Stagger: ml-orders at :00/:15/:30/:45 (15-min), ml-products at :07
# to avoid colliding with the orders cron's first window after the hour.
#
# Cascade is NOT called here (products are the candidates, not the
# to-be-matched). Re-embedding happens in the reembed-products cron via
# source_hash short-circuit (Pitfall 5 cross-cite).
#
# Degraded mode: same shape as sync-ml-orders / ml-refresh-tokens —
# succeeded no-op + exit 0 when ML envs are unset or no oauth_tokens
# row exists yet.
[[services]]
name = "orchestrator-cron-sync-ml-products"

[services.deploy]
startCommand = "node dist/cron.js sync-ml-products"
restartPolicyType = "NEVER"

[services.cron]
schedule = "7 * * * *"

# ─── F2 environment surface ──────────────────────────────────────
# Operator runbook: set these in the Railway service variables tab.
# Both services (web + cron) read the same list. See DEPLOY.md for the
# full token-routing table.
#
# Required for orchestrator to start:
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, PORT (web only), LOG_LEVEL
#
# WordPress (graceful degrade when any is unset — see PLAN §2.0.2):
#   WORDPRESS_API_URL, WORDPRESS_API_KEY, WORDPRESS_API_SECRET,
#   WORDPRESS_WEBHOOK_SECRET
#
# F2 matching cascade:
#   MATCH_EMBED_HIGH, MATCH_EMBED_MID, MATCH_ARBITER, MATCH_QUEUE_CUTOFF,
#   LLM_DAILY_TOKEN_CAP, EMBEDDING_MODEL, EMBEDDING_DIM, OPENAI_API_KEY
#
# F2 LLM arbiter (any ONE provider key is sufficient):
#   AI_GATEWAY_API_KEY | ANTHROPIC_API_KEY | OPENAI_API_KEY |
#   GOOGLE_GENERATIVE_AI_API_KEY | MOONSHOT_API_KEY
#   plus optional LLM_PROVIDER + LLM_MODEL overrides.
#
# Mercado Libre (F2.1) — OAuth + webhook. Graceful degrade when any
# of these are unset (healthCheck ok:false, syncs no-op, webhook 503,
# crons exit 0 with connector_runs.errors_json.reason='not_configured').
# Cliente registers the developer app at https://developers.mercadolibre.com.co
# and delivers the four secrets before live OAuth. Crons land in
# Plans 2.1.3.2 (sync-ml-orders) / 2.1.3.3 (sync-ml-products) /
# 2.1.3.4 (ml-refresh-tokens) — Wave 0 only documents the env contract.
#   ML_CLIENT_ID, ML_CLIENT_SECRET, ML_REDIRECT_URI, ML_WEBHOOK_SECRET,
#   ML_SITE_ID (hardcoded to "MCO"; F2.1 ships single-site only)
